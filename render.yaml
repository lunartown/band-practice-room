# Render Blueprint — 백엔드(NestJS) 배포
# https://render.com/docs/blueprint-spec
# Render에서 New + → Blueprint 로 이 저장소를 연결하면 이 파일을 읽는다.
services:
  - type: web
    name: hapjusil-api
    runtime: docker
    repo: https://github.com/lunartown/band-practice-room
    region: singapore # 한국에서 가장 가까운 무료 리전
    plan: free
    dockerfilePath: ./src/api/Dockerfile
    dockerContext: ./src/api
    healthCheckPath: /api/v1/areas
    envVars:
      - key: NODE_ENV
        value: production
      # Neon 등 외부 Postgres 연결 문자열 (Render 대시보드에서 직접 입력)
      - key: DATABASE_URL
        sync: false
