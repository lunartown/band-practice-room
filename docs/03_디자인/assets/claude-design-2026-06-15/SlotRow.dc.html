<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="display:flex;align-items:center;gap:12px;padding:13px 18px;background:#ffffff;border-bottom:1px solid #f2f4f6;font-family:Pretendard,-apple-system,sans-serif;">
  <div style="flex:0 0 50px;">
    <div style="font-size:16px;font-weight:700;color:#191f28;letter-spacing:-0.03em;line-height:1.05;">{{ time }}</div>
    <div style="font-size:11px;font-weight:500;color:#adb5bd;margin-top:3px;">{{ duration }}</div>
  </div>
  <div style="flex:1 1 auto;min-width:0;">
    <div style="font-size:13.5px;font-weight:600;color:#333d4b;letter-spacing:-0.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">{{ venue }}</div>
    <div style="display:flex;align-items:center;gap:6px;margin-top:4px;line-height:1;">
      <span style="font-size:11.5px;color:#8b95a1;white-space:nowrap;">{{ room }} · {{ area }}</span>
      <span style="width:5px;height:5px;border-radius:50%;background:{{ dotColor }};flex:0 0 auto;"></span>
      <span style="font-size:11px;font-weight:500;color:{{ freshTextColor }};white-space:nowrap;">{{ freshText }}</span>
    </div>
  </div>
  <div style="flex:0 0 auto;display:flex;flex-direction:column;align-items:flex-end;gap:6px;">
    <div style="font-size:13.5px;font-weight:700;color:#191f28;letter-spacing:-0.02em;">{{ price }}</div>
    <div style="display:flex;align-items:center;gap:3px;font-size:12px;font-weight:700;color:#ffffff;background:oklch(0.6 0.16 150);padding:5px 11px;border-radius:8px;letter-spacing:-0.01em;">예약<span style="font-size:9px;opacity:0.85;">↗</span></div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:372,&quot;height&quot;:66},&quot;time&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;14:00&quot;},&quot;duration&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;2시간&quot;},&quot;venue&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;그라운드 합주실 홍대 본점&quot;},&quot;room&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;A룸&quot;},&quot;area&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;홍대&quot;},&quot;price&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;₩32,000&quot;},&quot;freshText&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;3분 전 확인&quot;},&quot;dotColor&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;oklch(0.64 0.18 150)&quot;},&quot;freshTextColor&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;#8b95a1&quot;}}"></script>
</body>
</html>
