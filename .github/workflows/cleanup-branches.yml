name: Cleanup merged branches

# 쓸모를 다한(머지된 PR의) 브랜치를 자동으로 삭제한다.
# - PR 머지 시(pull_request: closed + merged): 해당 head 브랜치를 곧바로 삭제
# - 수동 실행(workflow_dispatch): 이미 쌓여 있던 머지·종료된 브랜치를 한 번에 쓸어 정리
#
# GITHUB_TOKEN 으로 같은 저장소의 ref 를 삭제하므로 별도 시크릿이 필요 없다.
# 안전장치: main/기본 브랜치, protected 브랜치, fork PR, 다른 열린 PR 이
#            아직 참조 중인 브랜치는 삭제하지 않는다.

on:
  pull_request:
    types: [closed]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: cleanup-branches
  cancel-in-progress: false

jobs:
  # PR 이 머지되면 그 head 브랜치를 삭제한다.
  on-merge:
    if: github.event_name == 'pull_request' && github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const { owner, repo } = context.repo;
            const branch = pr.head.ref;

            // fork 에서 온 PR 은 head 가 다른 저장소라 건드리지 않는다.
            if (pr.head.repo.full_name !== `${owner}/${repo}`) {
              core.info(`fork PR 이라 스킵: ${pr.head.repo.full_name}:${branch}`);
              return;
            }

            // 기본 브랜치는 절대 삭제하지 않는다.
            const { data: repoInfo } = await github.rest.repos.get({ owner, repo });
            if (branch === repoInfo.default_branch) {
              core.info(`기본 브랜치라 스킵: ${branch}`);
              return;
            }

            // protected 브랜치 스킵.
            try {
              const { data: br } = await github.rest.repos.getBranch({ owner, repo, branch });
              if (br.protected) {
                core.info(`protected 브랜치라 스킵: ${branch}`);
                return;
              }
            } catch (e) {
              core.info(`브랜치 조회 실패(이미 삭제됨?): ${branch}`);
              return;
            }

            // 같은 브랜치를 head 로 하는 다른 열린 PR 이 있으면 남겨 둔다.
            const { data: openPrs } = await github.rest.pulls.list({
              owner, repo, state: 'open', head: `${owner}:${branch}`, per_page: 100,
            });
            if (openPrs.length > 0) {
              core.info(`아직 열린 PR(#${openPrs.map(p => p.number).join(', #')}) 이 참조 중이라 스킵: ${branch}`);
              return;
            }

            await github.rest.git.deleteRef({ owner, repo, ref: `heads/${branch}` });
            core.notice(`삭제됨: ${branch} (PR #${pr.number} 머지)`);

  # 수동 실행: 열린 PR 이 하나도 없고, 머지/종료된 PR 이 있는 브랜치를 모두 삭제한다(백로그 청소).
  sweep:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const { data: repoInfo } = await github.rest.repos.get({ owner, repo });
            const defaultBranch = repoInfo.default_branch;

            const branches = await github.paginate(github.rest.repos.listBranches, {
              owner, repo, per_page: 100,
            });

            const deleted = [];
            const kept = [];
            for (const br of branches) {
              const name = br.name;

              if (name === defaultBranch || br.protected) {
                kept.push(`${name} (기본/protected)`);
                continue;
              }

              // 이 브랜치를 head 로 하는 PR 들(전체 상태)을 본다.
              const prs = await github.paginate(github.rest.pulls.list, {
                owner, repo, state: 'all', head: `${owner}:${name}`, per_page: 100,
              });

              if (prs.length === 0) {
                // PR 이력이 전혀 없는 브랜치는 작업 중일 수 있으니 보존.
                kept.push(`${name} (연결된 PR 없음)`);
                continue;
              }
              if (prs.some(p => p.state === 'open')) {
                kept.push(`${name} (열린 PR 있음)`);
                continue;
              }

              // 모든 PR 이 닫힘/머지됨 → 쓸모 다함.
              await github.rest.git.deleteRef({ owner, repo, ref: `heads/${name}` });
              deleted.push(name);
            }

            core.notice(`삭제: ${deleted.length ? deleted.join(', ') : '없음'}`);
            core.info(`보존:\n${kept.join('\n')}`);
