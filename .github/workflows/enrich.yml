name: Enrich studios

# 합주실 대표 이미지·리뷰수·키워드를 네이버 예약 + 스페이스클라우드에서 보강한다(image_url_scraped 등).
# slots 스크래퍼(scrape.yml, 매시간)와 달리 자주 바뀌지 않으므로 하루 1회면 충분하다.
# - 정기 실행(schedule): 매일 보강
# - 수동 실행(workflow_dispatch): 필요할 때 즉시 보강
#
# 사전 준비: 저장소 Settings → Secrets and variables → Actions 에
#   DATABASE_URL     = Neon prod(main 브랜치) 연결 문자열(?sslmode=require)
#   DATABASE_URL_DEV = Neon dev 브랜치 연결 문자열(수동 실행에서 dev 대상 선택 시 사용)
# 전제: studios/studio_sources 가 이미 시드돼 있어야 한다(scrape.yml 수동 실행으로 1회 시드).

on:
  workflow_dispatch:
    inputs:
      database:
        description: '대상 DB (정기 실행은 항상 prod, 수동 실행에서만 적용)'
        type: choice
        options:
          - prod
          - dev
        default: prod
  schedule:
    - cron: '30 18 * * *' # 매일 03:30 KST (18:30 UTC)

concurrency:
  group: enrich
  cancel-in-progress: false

jobs:
  enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      # 수동 실행에서 dev 를 고르면 Neon dev 브랜치(DATABASE_URL_DEV), 그 외(정기 실행 포함)는 prod.
      DATABASE_URL: ${{ (github.event_name == 'workflow_dispatch' && inputs.database == 'dev') && secrets.DATABASE_URL_DEV || secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Migrate (idempotent)
        working-directory: src/api
        run: |
          npm ci
          npm run db:migrate
          # 수동 썸네일(image_url_manual)을 멱등 재적용 — 스크랩 보강 전에 항상 보장한다.
          npm run db:seed:visuals

      - name: Enrich studios (images/reviews)
        working-directory: src/scraper
        run: |
          npm ci
          npx tsx scripts/enrich-studios.ts

      - name: Enrich SpaceCloud studios (images)
        working-directory: src/scraper
        env:
          SPACECLOUD_API_TOKEN: ${{ secrets.SPACECLOUD_API_TOKEN }}
        run: npx tsx scripts/enrich-spacecloud.ts
