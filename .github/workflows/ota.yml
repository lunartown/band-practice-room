name: OTA deploy (Capgo)

# 프런트(JS/CSS/HTML) 변경을 스토어 재심사 없이 Capgo 라이브 업데이트로 배포한다.
# capacitor.config.ts 의 CapacitorUpdater.autoUpdate=true 라서, 새 번들을 올리면
# 사용자가 앱을 실행/복귀할 때 받아 다음 실행에 자동 적용된다(네이티브 변경은 제외).
#
# 배포 대상 (브랜치 = 앱)
#   - push(main) → 프로덕션 앱  com.hapjusil.app      (production 채널, 실유저)
#   - push(dev)  → dev 앱        com.hapjusil.app.dev  (production 채널, 별도 테스트 앱)
#   - workflow_dispatch: appid/channel 을 직접 지정(비우면 브랜치로 자동 판별).
#
# dev 앱은 번들 ID 가 달라(iOS Debug 빌드 = com.hapjusil.app.dev) Capgo 에서도
# 완전히 별개의 앱이다. "합주실 DEV" 를 폰에 한 번 네이티브로 깔아 두면, 그 앱은
# 자기 앱(com.hapjusil.app.dev)의 기본 채널을 autoUpdate 로 받으므로 채널 배정이
# 필요 없다. 프로덕션 앱(com.hapjusil.app)은 전혀 영향받지 않는다.
#
# 사전 준비:
#   - 저장소 Settings → Secrets and variables → Actions 에
#     CAPGO_TOKEN = Capgo API 키(All / Upload 권한) 등록
#     → https://web.capgo.app 의 Account → API keys 에서 발급
#   - Capgo 에 dev 앱 등록(최초 1회):
#     npx @capgo/cli app add com.hapjusil.app.dev
#     npx @capgo/cli channel add production com.hapjusil.app.dev --default

on:
  workflow_dispatch:
    inputs:
      appid:
        description: '대상 앱 ID (비우면 브랜치로 판별: main→com.hapjusil.app, 그 외→com.hapjusil.app.dev)'
        required: false
        default: ''
      channel:
        description: '배포 채널 (기본 production)'
        required: false
        default: ''
  push:
    branches: [main, dev]
    paths:
      - 'src/web/**'
      - '.github/workflows/ota.yml'

concurrency:
  group: ota
  cancel-in-progress: false

jobs:
  ota:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CAPGO_TOKEN: ${{ secrets.CAPGO_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Guard - CAPGO_TOKEN 누락 시 친절히 실패
        run: |
          if [ -z "$CAPGO_TOKEN" ]; then
            echo "::error::CAPGO_TOKEN 시크릿이 없습니다. Settings → Secrets and variables → Actions 에 등록하세요."
            exit 1
          fi

      - name: Build (capacitor 모드)
        working-directory: src/web
        run: |
          npm ci
          npm run build:app

      # 번들 버전 규칙: 네이티브 앱과 같은 메이저.마이너(현재 1.0)를 유지하고
      # patch 만 run_number 로 단조 증가시킨다 → 1.0.<run_number>.
      # Capgo 는 기본적으로 메이저가 다른 번들의 자동 적용을 막으므로(채널 기본 정책),
      # 네이티브 버전(iOS MARKETING_VERSION / Android versionName, 현재 1.0)과
      # 메이저를 반드시 맞춰야 기기에 실제로 내려간다.
      # 네이티브 앱 버전을 올리면(예: 1.1) 아래 BASE 도 같이 바꾼다.
      - name: Upload bundle to Capgo
        working-directory: src/web
        run: |
          # 브랜치 = 배포 대상 앱. main 은 프로덕션 앱, dev 는 별도 dev 앱.
          case "${{ github.ref_name }}" in
            main) APP_ID="com.hapjusil.app";     CHANNEL="production" ;;
            *)    APP_ID="com.hapjusil.app.dev"; CHANNEL="production" ;;
          esac
          # 수동 실행(dispatch) 입력이 있으면 덮어쓴다.
          [ -n "${{ github.event.inputs.appid }}" ]   && APP_ID="${{ github.event.inputs.appid }}"
          [ -n "${{ github.event.inputs.channel }}" ] && CHANNEL="${{ github.event.inputs.channel }}"
          BASE="1.0"
          BUNDLE="$BASE.${{ github.run_number }}"
          echo "Uploading bundle $BUNDLE to app $APP_ID (channel $CHANNEL)"
          npx @capgo/cli@^8 bundle upload \
            --apikey "$CAPGO_TOKEN" \
            --appid "$APP_ID" \
            --channel "$CHANNEL" \
            --bundle "$BUNDLE"
