name: OTA deploy (Capgo)

# 프런트(JS/CSS/HTML) 변경을 스토어 재심사 없이 Capgo 라이브 업데이트로 배포한다.
# capacitor.config.ts 의 CapacitorUpdater.autoUpdate=true 라서, 새 번들을 올리면
# 사용자가 앱을 실행/복귀할 때 받아 다음 실행에 자동 적용된다(네이티브 변경은 제외).
#
# 채널 매핑 (브랜치 = 채널)
#   - push(main) → com.hapjusil.app / production 채널: 실유저용.
#   - push(dev)  → com.hapjusil.app.dev / dev 채널: 테스트 앱 전용.
#   - Release 워크플로 성공 → production 채널: GitHub Actions 토큰 push 는
#     push 워크플로를 재트리거하지 않으므로 릴리스 완료 이벤트도 받는다.
#   - workflow_dispatch: target 을 직접 지정(비우면 브랜치로 자동 판별).
#
# prod/dev는 Capgo 채널만 다른 것이 아니라 네이티브 appId도 다르다.
# 그래서 dev OTA는 테스트 앱(com.hapjusil.app.dev)에만 내려가고,
# 스토어 앱(com.hapjusil.app)을 덮지 않는다.
#
# 사전 준비:
#   - 저장소 Settings → Secrets and variables → Actions 에
#     CAPGO_TOKEN = Capgo API 키(All / Upload 권한) 등록
#     → https://web.capgo.app 의 Account → API keys 에서 발급
#   - Capgo 앱/채널 생성(최초 1회):
#     npx @capgo/cli app add com.hapjusil.app
#     npx @capgo/cli channel add production com.hapjusil.app --default
#     npx @capgo/cli app add com.hapjusil.app.dev
#     npx @capgo/cli channel add dev com.hapjusil.app.dev --default

on:
  workflow_dispatch:
    inputs:
      target:
        description: '배포 대상 (auto: main/release→prod, 그 외→dev)'
        required: false
        default: 'auto'
        type: choice
        options:
          - auto
          - prod
          - dev
  push:
    branches: [main, dev]
    paths:
      - 'src/web/**'
      - '.github/workflows/ota.yml'
  workflow_run:
    workflows: ['Release (dev→main fast-forward)']
    types: [completed]

concurrency:
  group: ota
  cancel-in-progress: false

jobs:
  ota:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CAPGO_TOKEN: ${{ secrets.CAPGO_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Guard - CAPGO_TOKEN 누락 시 친절히 실패
        run: |
          if [ -z "$CAPGO_TOKEN" ]; then
            echo "::error::CAPGO_TOKEN 시크릿이 없습니다. Settings → Secrets and variables → Actions 에 등록하세요."
            exit 1
          fi

      - name: Resolve Capgo target
        run: |
          TARGET="${{ github.event.inputs.target }}"
          [ -z "$TARGET" ] && TARGET="auto"

          if [ "$TARGET" = "auto" ]; then
            case "${{ github.event_name }}" in
              workflow_run) TARGET="prod" ;;
              *)
                case "${{ github.ref_name }}" in
                  main) TARGET="prod" ;;
                  *)    TARGET="dev" ;;
                esac
                ;;
            esac
          fi

          case "$TARGET" in
            prod)
              echo "CAPACITOR_APP_VARIANT=prod" >> "$GITHUB_ENV"
              echo "CAPGO_CHANNEL=production" >> "$GITHUB_ENV"
              echo "CAPGO_APP_ID=com.hapjusil.app" >> "$GITHUB_ENV"
              ;;
            dev)
              echo "CAPACITOR_APP_VARIANT=dev" >> "$GITHUB_ENV"
              echo "CAPGO_CHANNEL=dev" >> "$GITHUB_ENV"
              echo "CAPGO_APP_ID=com.hapjusil.app.dev" >> "$GITHUB_ENV"
              ;;
            *)
              echo "::error::target은 auto/prod/dev 중 하나여야 합니다: $TARGET"
              exit 1
              ;;
          esac

      - name: Build (capacitor 모드)
        working-directory: src/web
        run: |
          npm ci
          npm run build:app

      # 번들 버전 규칙: 네이티브 앱과 같은 메이저.마이너(현재 1.0)를 유지하고
      # patch 만 run_number 로 단조 증가시킨다 → 1.0.<run_number>.
      # Capgo 는 기본적으로 메이저가 다른 번들의 자동 적용을 막으므로(채널 기본 정책),
      # 네이티브 버전(iOS MARKETING_VERSION / Android versionName, 현재 1.0)과
      # 메이저를 반드시 맞춰야 기기에 실제로 내려간다.
      # 네이티브 앱 버전을 올리면(예: 1.1) 아래 BASE 도 같이 바꾼다.
      - name: Upload bundle to Capgo
        working-directory: src/web
        run: |
          BASE="1.0"
          BUNDLE="$BASE.${{ github.run_number }}"
          echo "Uploading bundle $BUNDLE to $CAPGO_APP_ID / $CAPGO_CHANNEL"
          npx @capgo/cli@^8 bundle upload \
            --apikey "$CAPGO_TOKEN" \
            --channel "$CAPGO_CHANNEL" \
            --bundle "$BUNDLE" \
            --ignore-metadata-check
